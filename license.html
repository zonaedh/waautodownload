<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 360px;
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  padding: 30px 20px;
  text-align: center;
}
.logo {
  background: #075e54;
  color: white;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: bold;
  margin: 0 auto 16px;
  line-height: 1.3;
}
h2 {
  color: #075e54;
  font-size: 16px;
  margin-bottom: 6px;
}
p {
  color: #888;
  font-size: 12px;
  margin-bottom: 20px;
  line-height: 1.5;
}
input {
  width: 100%;
  padding: 10px 12px;
  border: 2px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 10px;
  outline: none;
}
input:focus { border-color: #075e54; }
button {
  width: 100%;
  padding: 11px;
  background: #25d366;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  margin-bottom: 10px;
}
button:hover { background: #1ebe5d; }
button:disabled { background: #aaa; cursor: not-allowed; }
#message {
  font-size: 12px;
  min-height: 18px;
  margin-bottom: 10px;
  font-weight: bold;
}
.error { color: #e53935; }
.success { color: #25d366; }
.checking { color: #1976d2; }
footer {
  font-size: 10px;
  color: #aaa;
  margin-top: 16px;
  border-top: 1px solid #ddd;
  padding-top: 12px;
}
footer a { color: #075e54; text-decoration: none; }
</style>
</head>
<body>

<div class="logo">WA<br>Sender</div>
<h2>WhatsApp Bulk Sender</h2>
<p>Enter your license key to activate the extension.<br>
Contact the developer to get a key.</p>

<input type="text" id="keyInput" placeholder="SHARK-XXXX-XXXX-XXXX" maxlength="50">
<div id="message"></div>
<button id="activateBtn">Activate</button>

<footer>
  Made by Zonaed Hossain &hearts;
  <a href="https://www.zonaedhossain.com" target="_blank">www.zonaedhossain.com</a>
</footer>

<script src="license.js"></script>
<script src="license-ui.js"></script>
</body>
</html>
